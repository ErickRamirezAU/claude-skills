name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Check Python syntax
        run: |
          find skills -name '*.py' -print0 | xargs -0 -r python -m py_compile

      - name: Check shell script syntax
        run: |
          find skills -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Shellcheck
        run: |
          find skills -name '*.sh' -print0 | xargs -0 -r shellcheck --severity=warning

      - name: Verify skill layout (SKILL.md + README.md per skill)
        run: |
          status=0
          for dir in skills/*/; do
            name=$(basename "$dir")
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "::error::$name is missing SKILL.md"
              status=1
            fi
            if [ ! -f "$dir/README.md" ]; then
              echo "::error::$name is missing README.md"
              status=1
            fi
          done
          exit $status
