name: Bug report
description: Something isn't working the way a skill describes
labels: ["bug"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: Which skill is this about?
      options:
        - youtube-idea-finder
        - youtube-video-evaluator
        - markitdown
        - Something else / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you ask Claude to do, and what went wrong?
      placeholder: "e.g. I asked Claude to find overperforming videos about X, and it said the script failed with..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen instead?
    validations:
      required: false
  - type: input
    id: claude-client
    attributes:
      label: How are you using Claude?
      placeholder: "e.g. Claude Desktop, claude.ai, Claude Code"
    validations:
      required: false
